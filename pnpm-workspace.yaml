packages:
  - 'client/*'
  - 'client/packages/*'
  - 'client/packages/features/*'
  - 'packages/*'
  - 'services/*'
  - 'infra'

catalog:
  # Build & Runtime
  turbo: '^2.8.10'
  typescript: '^5.9.3'
  ts-node: '^10.9.2'
  '@types/node': '^25.2.3'

  # Linting & Formatting
  eslint: '^10.0.0'
  prettier: '^3.8.1'
  eslint-config-prettier: '^10.1.8'
  typescript-eslint: '^8.55.0'

  # Commit & Git
  '@commitlint/cli': '^20.4.2'
  '@commitlint/config-conventional': '^20.4.2'
  '@commitlint/types': '^20.4.0'
  husky: '^9.1.7'

  # Testing
  jest: '^30.2.0'
  ts-jest: '^29.4.6'
  '@types/jest': '^30.0.0'

  # AWS & Infra
  aws-cdk-lib: '^2.238.0'
  aws-cdk: '^2.1106.0'
  constructs: '^10.4.5'
  aws-sdk: '^2.1693.0'

  # Paths
  tsconfig-paths: '^4.2.0'
