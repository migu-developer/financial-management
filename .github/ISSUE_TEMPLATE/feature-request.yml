name: Feature Request
description: Suggest a new feature or improvement
labels: ['feat']

body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion. Please describe the feature below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project would this affect?
      options:
        - Client (Expo / React Native)
        - Services (Lambda / API)
        - Infrastructure (CDK)
        - Packages (shared libraries)
        - CI/CD (GitHub Actions)
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this feature working?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.
