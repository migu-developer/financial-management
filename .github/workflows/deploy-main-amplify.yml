# Deploy client/main to AWS Amplify for staging and production environments.
#
# Automatic deploy fires after CI passes on main when changes are detected in:
#   - client/main/**
#   - .github/workflows/deploy-main-amplify.yml
# Release and manual triggers always deploy regardless of changed paths.
#
# Environment resolution (single source of truth: setup job):
#   staging    — CI passes on main  OR  pre-release
#   production — published release (non-pre-release)
#   manual     — environment chosen via workflow_dispatch input
#
# Authentication: OIDC — no static AWS keys required.
# The IAM role is assumed via GitHub's OIDC provider (id-token: write).
#
# Configure per environment in GitHub Settings → Environments:
#
#   Required secrets:
#     DEPLOY_ROLE_ARN   — ARN of the IAM role with Amplify deploy permissions
#     AMPLIFY_APP_ID    — Amplify App ID (from CDK output AmplifyAppId)
#
#   Optional variables:
#     AWS_REGION        — AWS region, defaults to us-east-1
#     AMPLIFY_BRANCH    — Amplify branch to deploy, defaults to main

name: Deploy client/main to Amplify

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      branch:
        description: 'Amplify branch to deploy (overrides AMPLIFY_BRANCH var)'
        required: false
        type: string
      dry_run:
        description: 'Simulate the deploy without triggering Amplify (for testing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  # actions: read is granted per-job in setup to follow least-privilege

# NOTE: concurrency.group is the only place the expression is repeated because
# GitHub Actions evaluates it before any job runs — it cannot reference job outputs.
concurrency:
  group: >-
    amplify-deploy-${{
      (github.event_name == 'workflow_run' ||
       (github.event_name == 'release' && github.event.release.prerelease == true))
      && 'staging'
      || inputs.environment
      || 'production'
    }}
  cancel-in-progress: false

jobs:
  setup:
    name: ⚙️ Resolve environment & verify CI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      env_name: ${{ steps.resolve.outputs.env_name }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - name: 📥 Checkout actions
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Resolve environment and check CI
        id: resolve
        uses: ./.github/actions/resolve_deploy_env
        with:
          deploy_paths: '^(client/main/|client/packages/|\.github/workflows/deploy-main-amplify\.yml)'

  deploy:
    name: 🚀 Trigger Amplify build
    needs: [setup]
    if: needs.setup.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ needs.setup.outputs.env_name }}
    env:
      DEPLOY_ROLE_ARN: ${{ secrets.DEPLOY_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
      AMPLIFY_BRANCH: ${{ inputs.branch || vars.AMPLIFY_BRANCH }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      DEPLOY_ENV: ${{ needs.setup.outputs.env_name }}

    steps:
      - name: 📥 Checkout actions
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: ✅ Validate required configuration
        shell: bash
        run: |
          missing=()
          [[ -z "$DEPLOY_ROLE_ARN" ]] && missing+=("DEPLOY_ROLE_ARN (secret)")
          [[ -z "$AMPLIFY_APP_ID" ]]  && missing+=("AMPLIFY_APP_ID (secret)")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets/variables: ${missing[*]}"
            exit 1
          fi
          echo "✅ All required secrets and variables are set."

      - name: 🔐 Assume deployment role
        uses: ./.github/actions/assume_role
        with:
          role-arn: ${{ env.DEPLOY_ROLE_ARN }}
          region: ${{ env.AWS_REGION }}

      - name: 📤 Start Amplify build
        id: start-job
        shell: bash
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::Dry run — skipping Amplify job trigger"
            echo "job_id=dry-run" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE \
            --query 'jobSummary.jobId' \
            --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Amplify job $JOB_ID started — app $AMPLIFY_APP_ID, branch $AMPLIFY_BRANCH"

      - name: 📋 Job summary
        if: always()
        shell: bash
        run: |
          RELEASE="${{ github.event.release.tag_name || 'n/a' }}"
          JOB_ID="${{ steps.start-job.outputs.job_id || 'n/a' }}"
          TRIGGER="${{ github.event_name }}"

          if [[ "$DRY_RUN" == "true" ]]; then
            TITLE="🚀 Amplify deploy (dry run)"
          else
            TITLE="🚀 Amplify deploy triggered"
          fi

          {
            echo "### $TITLE"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Environment | \`$DEPLOY_ENV\` |"
            echo "| Trigger | \`$TRIGGER\` |"
            echo "| Release | $RELEASE |"
            echo "| Branch | \`$AMPLIFY_BRANCH\` |"
            echo "| Region | \`$AWS_REGION\` |"
            echo "| Amplify Job ID | \`$JOB_ID\` |"
          } >> "$GITHUB_STEP_SUMMARY"
