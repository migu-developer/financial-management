# Integration Tests: runs services against the Supabase test database.
# Runs on PRs (to any branch) and on push to main.
# Each run creates an isolated test schema using the GitHub run ID
# to prevent collisions between concurrent runs.
# Note: does not run on release events — integration tests are guaranteed to have
# already run on the underlying commit when it was pushed to main.
name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_READONLY_URL: ${{ secrets.DATABASE_READONLY_URL }}
      DATABASE_SCHEMA: ${{ vars.DATABASE_SCHEMA }}
      TEST_RUN_ID: ${{ github.run_id }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Configure pnpm and Node.js
        uses: ./.github/actions/configure_pnpm

      - name: 🐘 Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          sudo update-alternatives --install /usr/bin/pg_dump pg_dump /usr/lib/postgresql/17/bin/pg_dump 170
          pg_dump --version

      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📤 Export schema DDL from Supabase test database
        run: pnpm migrations:export

      - name: 🧪 Run integration tests
        run: pnpm test:integration
