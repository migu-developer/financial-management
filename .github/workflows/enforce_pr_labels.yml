name: Enforce PR Labels

on:
  pull_request:
    types:
      [
        labeled,
        unlabeled,
        opened,
        edited,
        synchronize,
        reopened,
        ready_for_review,
      ]

permissions:
  pull-requests: write
  issues: read

jobs:
  enforce-label:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: yogevbd/enforce-label-action@2.2.2
        with:
          REQUIRED_LABELS_ANY: 'feat,fix,docs,style,refactor,perf,test,build,ci,chore,revert'
          REQUIRED_LABELS_ANY_DESCRIPTION: "Please apply one label: 'feat', 'fix', 'docs', 'style', 'refactor', 'perf', 'test', 'build', 'ci', 'chore', or 'revert'"
