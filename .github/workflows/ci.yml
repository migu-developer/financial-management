# CI: lint, typecheck, format, test.
# Runs on PRs (to any branch) and on push to main.
# Note: does not run on release events — CI is guaranteed to have already
# run on the underlying commit when it was pushed to main.
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🔧 Configure pnpm and Node.js
        uses: ./.github/actions/configure_pnpm

      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      - name: 📐 Typecheck
        run: pnpm typecheck

      - name: ✨ Format check
        run: pnpm format

      - name: 🧪 Test
        run: pnpm test

      - name: 🤖 AI docs test
        run: pnpm ai:test

  sfn-local:
    # Exercises the ChatProcess state machine end-to-end against AWS Step
    # Functions Local with a MockConfigFile — every branch, retry and catch,
    # plus a completeness guard that fails if a new Task state isn't covered by
    # a test case. No AWS deploy, no credentials. Runs in parallel with quality.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Step Functions Local
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🔧 Configure pnpm and Node.js
        uses: ./.github/actions/configure_pnpm

      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🐳 Pull Step Functions Local image
        run: docker pull amazon/aws-stepfunctions-local

      - name: 🧰 Verify AWS CLI is available
        run: aws --version

      - name: 🧪 Run Step Functions Local mock suite
        run: pnpm --filter @infra test:sfn-local
