# CI: lint, typecheck, format, test.
# Runs on PRs (to any branch) and on push to main.
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: ${{ github.event_name == 'pull_request' && 'PR checks' || 'Main branch checks' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      - name: 📐 Typecheck
        run: pnpm typecheck

      - name: ✨ Format check
        run: pnpm format

      - name: 🧪 Test
        run: pnpm test
