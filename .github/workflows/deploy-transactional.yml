# Deploy transactional email templates to S3 for staging and production environments.
#
# Automatic deploy fires after CI passes on main when changes are detected in:
#   - packages/transactional/**
#   - .github/workflows/deploy-transactional.yml
# Release and manual triggers always deploy regardless of changed paths.
#
# Environment resolution (single source of truth: resolve_deploy_env action):
#   staging    — CI passes on main  OR  pre-release
#   production — published release (non-pre-release)
#   manual     — environment chosen via workflow_dispatch input
#
# Authentication: OIDC — no static AWS keys required.
# The IAM role must have s3:PutObject on the target bucket prefix.
#
# Configure per environment in GitHub Settings → Environments:
#
#   Required secrets:
#     DEPLOY_ROLE_ARN          — ARN of the IAM role with s3:PutObject permissions
#
#   Required variables:
#     AWS_REGION               — AWS region of the target bucket (e.g. us-east-1)
#     ASSETS_BUCKET_PREFIX     — Bucket name prefix (e.g. migudev-fm)
#     EMAILS_PREFIX    — S3 key prefix for emails (e.g. cognito/emails)
#     ASSETS_URL               — Base URL for static assets used in email templates
#     APPLICATION_URL          — App URL used in email links

name: Deploy transactional emails to S3

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: 'Simulate the upload without pushing to S3 (for testing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  # actions: read is granted per-job in setup to follow least-privilege

# NOTE: concurrency.group is the only place the expression is repeated because
# GitHub Actions evaluates it before any job runs — it cannot reference job outputs.
concurrency:
  group: >-
    transactional-deploy-${{
      (github.event_name == 'workflow_run' ||
       (github.event_name == 'release' && github.event.release.prerelease == true))
      && 'staging'
      || inputs.environment
      || 'production'
    }}
  cancel-in-progress: false

jobs:
  setup:
    name: ⚙️ Resolve environment & verify CI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      env_name: ${{ steps.resolve.outputs.env_name }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - name: 📥 Checkout actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Resolve environment and check CI
        id: resolve
        uses: ./.github/actions/resolve_deploy_env
        with:
          deploy_paths: '^(packages/transactional/|\.github/workflows/deploy-transactional\.yml)'

  upload:
    name: 📧 Export & upload email templates
    needs: [setup]
    if: needs.setup.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ needs.setup.outputs.env_name }}
    env:
      DEPLOY_ROLE_ARN: ${{ secrets.DEPLOY_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ASSETS_BUCKET_PREFIX: ${{ vars.ASSETS_BUCKET_PREFIX }}
      EMAILS_PREFIX: ${{ vars.EMAILS_PREFIX }}
      ASSETS_URL: ${{ vars.ASSETS_URL }}
      APPLICATION_URL: ${{ vars.APPLICATION_URL }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      DEPLOY_ENV: ${{ needs.setup.outputs.env_name }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Configure Node and pnpm
        uses: ./.github/actions/configure_pnpm

      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile --filter @packages/transactional...

      - name: ✅ Validate required configuration
        shell: bash
        run: |
          missing=()
          [[ -z "$DEPLOY_ROLE_ARN" ]]       && missing+=("DEPLOY_ROLE_ARN (secret)")
          [[ -z "$AWS_REGION" ]]            && missing+=("AWS_REGION (var)")
          [[ -z "$ASSETS_BUCKET_PREFIX" ]]  && missing+=("ASSETS_BUCKET_PREFIX (var)")
          [[ -z "$EMAILS_PREFIX" ]] && missing+=("EMAILS_PREFIX (var)")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets/variables: ${missing[*]}"
            exit 1
          fi
          echo "✅ All required secrets and variables are set."

      - name: 🔐 Assume deployment role
        uses: ./.github/actions/assume_role
        with:
          role-arn: ${{ env.DEPLOY_ROLE_ARN }}
          region: ${{ env.AWS_REGION }}

      - name: 🔨 Export email templates
        shell: bash
        run: pnpm --filter @packages/transactional email:export

      - name: 📤 Upload to S3
        shell: bash
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::Dry run — skipping S3 upload"
            exit 0
          fi
          pnpm --filter @packages/transactional email:upload

      - name: 📋 Job summary
        if: always()
        shell: bash
        run: |
          RELEASE="${{ github.event.release.tag_name || 'n/a' }}"
          TRIGGER="${{ github.event_name }}"
          BUCKET="${ASSETS_BUCKET_PREFIX}-${AWS_REGION}-assets"

          if [[ "$DRY_RUN" == "true" ]]; then
            TITLE="📧 Email templates upload (dry run)"
          else
            TITLE="📧 Email templates uploaded to S3"
          fi

          {
            echo "### $TITLE"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Environment | \`$DEPLOY_ENV\` |"
            echo "| Trigger | \`$TRIGGER\` |"
            echo "| Release | $RELEASE |"
            echo "| Region | \`$AWS_REGION\` |"
            echo "| Bucket | \`$BUCKET\` |"
            echo "| Prefix | \`$EMAILS_PREFIX\` |"
          } >> "$GITHUB_STEP_SUMMARY"
