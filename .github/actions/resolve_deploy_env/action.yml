name: Resolve deploy environment
description: >
  Resolves the target environment (staging/production) and verifies CI for
  automated deploy workflows. Shared across all deploy workflows.

inputs:
  deploy_paths:
    description: >
      JavaScript RegExp source (no surrounding slashes) matching file paths
      that should trigger a deploy on workflow_run events.
      Example: ^(packages/transactional/|\.github/workflows/deploy-transactional\.yml)
    required: true

outputs:
  env_name:
    description: Resolved environment name — staging | production | <manual input>
    value: ${{ steps.resolve.outputs.env_name }}
  should_deploy:
    description: Whether the deploy should proceed — 'true' | 'false'
    value: ${{ steps.resolve.outputs.should_deploy }}

runs:
  using: composite
  steps:
    - name: Resolve environment and check CI
      id: resolve
      uses: actions/github-script@v7
      env:
        DEPLOY_PATHS: ${{ inputs.deploy_paths }}
      with:
        script: |
          const eventName = context.eventName;
          const isPrerelease = eventName === 'release' && context.payload.release.prerelease;

          // Single source of truth for environment resolution
          let envName;
          if (eventName === 'workflow_run' || isPrerelease) {
            envName = 'staging';
          } else if (eventName === 'release' && !context.payload.release.prerelease) {
            envName = 'production';
          } else {
            envName = context.payload.inputs?.environment ?? '';
          }
          core.setOutput('env_name', envName);

          // CI verification — only needed for workflow_run and pre-release
          if (eventName === 'workflow_run') {
            const { conclusion, head_sha, run_number } = context.payload.workflow_run;

            if (conclusion !== 'success') {
              core.info(`CI finished with conclusion: ${conclusion} — skipping deploy`);
              core.setOutput('should_deploy', 'false');
              return;
            }

            // Path filtering: only deploy when relevant files changed
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: head_sha,
            });

            const DEPLOY_PATHS = new RegExp(process.env.DEPLOY_PATHS);
            const relevant = commit.files?.some(f => DEPLOY_PATHS.test(f.filename)) ?? false;

            if (!relevant) {
              core.info('No relevant paths changed — skipping deploy');
              core.setOutput('should_deploy', 'false');
            } else {
              core.info(`✅ CI passed (run #${run_number}) and relevant paths changed — deploying`);
              core.setOutput('should_deploy', 'true');
            }
          } else if (isPrerelease) {
            // Pre-release: verify CI passed for this release commit
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: context.sha,
              per_page: 10,
            });

            const success = data.workflow_runs.find(r => r.conclusion === 'success');
            if (!success) {
              const runs = data.workflow_runs
                .map(r => `  • Run #${r.run_number}: ${r.conclusion ?? 'in progress'}`)
                .join('\n');
              core.setFailed(
                `No successful CI run found for commit ${context.sha}.\n` +
                (runs ? `Found runs:\n${runs}` : 'No CI runs found for this commit.')
              );
              return;
            }
            core.info(`✅ CI passed — run #${success.run_number} (${success.html_url})`);
            core.setOutput('should_deploy', 'true');
          } else {
            // Production release or workflow_dispatch — always deploy
            core.setOutput('should_deploy', 'true');
          }
