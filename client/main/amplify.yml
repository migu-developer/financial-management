# Build spec for this app only (client/main – Expo web).
# Must use "applications" when AMPLIFY_MONOREPO_APP_ROOT is set; appRoot must match that env var.
version: 1
applications:
  - appRoot: client/main
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@10.29.3 --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            - echo "EXPO_PUBLIC_USER_POOL_ID=$USER_POOL_ID" > client/main/.env
            - echo "EXPO_PUBLIC_USER_POOL_CLIENT_ID=$USER_POOL_CLIENT_ID" >> client/main/.env
            - echo "EXPO_PUBLIC_IDENTITY_POOL_ID=$IDENTITY_POOL_ID" >> client/main/.env
            - echo "EXPO_PUBLIC_ASSETS_BUCKET_NAME=$ASSETS_BUCKET_NAME" >> client/main/.env
            - pnpm --filter @client/main build:web
            - pnpm --filter @client/main run fix-font-paths
      artifacts:
        baseDirectory: client/main/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
